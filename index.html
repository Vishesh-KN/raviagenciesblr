<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ravi Agencies – Brand Catalogs</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0f1623;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --cream: #f7f4ef;
      --text: #1a1a2a;
      --muted: #8a8a9a;
      --border: rgba(0,0,0,0.07);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
    header {
      background: var(--navy); padding: 0 48px;
      display: flex; align-items: center; justify-content: space-between;
      height: 72px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 24px rgba(0,0,0,0.25);
    }
    .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
    .logo img { height: 44px; width: 44px; object-fit: contain; border-radius: 8px; }
    .logo-fallback {
      width: 44px; height: 44px; background: var(--gold); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 22px; color: var(--navy); font-weight: 700;
    }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #fff; letter-spacing: 0.3px; }
    .logo-text span { color: var(--gold); }
    .logo-sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; letter-spacing: 0.5px; }
    nav { display: flex; gap: 28px; }
    nav a { color: rgba(255,255,255,0.55); text-decoration: none; font-size: 14px; transition: color 0.2s; }
    nav a:hover { color: var(--gold-light); }
    .hero {
      background: var(--navy); color: white;
      text-align: center; padding: 64px 24px 72px;
      position: relative; overflow: hidden;
    }
    .hero-brand { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:18px; }
    .hero-logo-img { height: 90px; width: auto; border-radius: 10px; object-fit: contain; }
    .hero .logo-fallback { width:90px; height:90px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:34px; }
    .hero-brand-name { font-family: 'Playfair Display', serif; font-size: clamp(20px, 4vw, 34px); font-weight: 700; color: white; }

    .contact-bar { position: absolute; left: 50%; transform: translateX(-50%); bottom: 18px; display:flex; gap:12px; align-items:center; }
    .contact-pill { display:inline-flex; align-items:center; gap:10px; padding:8px 14px; border-radius:999px; background: rgba(0,0,0,0.45); color: #fff; text-decoration:none; font-size:14px; border: 1px solid rgba(255,255,255,0.06); }
    .contact-pill svg { width:18px; height:18px; flex-shrink:0; fill: var(--gold); }
    .contact-pill.whatsapp svg { fill: #25D366; }
    .contact-pill:hover { background: rgba(0,0,0,0.55); }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 120%, rgba(201,168,76,0.15) 0%, transparent 65%);
      pointer-events: none;
    }
    .hero-tag {
      display: inline-block; font-size: 11px; font-weight: 500;
      letter-spacing: 2px; text-transform: uppercase; color: var(--gold);
      border: 1px solid rgba(201,168,76,0.3); padding: 5px 16px; border-radius: 20px; margin-bottom: 20px;
    }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 46px); font-weight: 700; line-height: 1.15; margin-bottom: 14px; }
    .hero p { font-size: 15px; color: rgba(255,255,255,0.5); max-width: 400px; margin: 0 auto; line-height: 1.7; }
    .catalog-section { max-width: 1200px; margin: 0 auto; padding: 52px 32px 80px; }
      .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
      .section-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; }
      .section-right { display:flex; align-items:center; gap:12px; }
      .filters { display:flex; gap:8px; align-items:center; }
      .filter-pill { padding:6px 12px; border-radius:999px; background:#fff; color:var(--navy); border:1px solid rgba(15,22,35,0.08); cursor:pointer; font-size:13px; font-weight:500; }
      .filter-pill:hover { color: var(--gold); }
      .filter-pill.active { background: var(--navy); color: #fff; border-color: transparent; }
      .brand-count { font-size: 13px; color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
    .card {
      background: #fff; border-radius: 16px; overflow: hidden;
      border: 1px solid var(--border); text-decoration: none; color: inherit;
      display: flex; flex-direction: column; cursor: pointer;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease;
      animation: fadeUp 0.5s both;
    }
    .card:hover { transform: translateY(-6px); box-shadow: 0 20px 48px rgba(0,0,0,0.12); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .card-img-wrap { width: 100%; aspect-ratio: 4/3; overflow: hidden; background: #e8e4dd; position: relative; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .card:hover .card-img-wrap img { transform: scale(1.04); }
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(15,22,35,0.65) 0%, transparent 55%);
      opacity: 0; transition: opacity 0.3s;
      display: flex; align-items: flex-end; justify-content: center; padding-bottom: 18px;
    }
    .card:hover .card-overlay { opacity: 1; }
    .view-btn { background: var(--gold); color: var(--navy); font-size: 12px; font-weight: 500; padding: 8px 20px; border-radius: 20px; }
    .card-body { padding: 14px 16px 16px; display: flex; align-items: center; justify-content: space-between; }
    .card-name { font-size: 15px; font-weight: 500; }
    .card-arrow { width: 28px; height: 28px; border-radius: 50%; background: var(--cream); display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .card:hover .card-arrow { background: var(--gold); }
    .card-arrow svg { width: 12px; height: 12px; }
    .skeleton { background: #e8e4dd; border-radius: 16px; aspect-ratio: 3/5; position: relative; overflow: hidden; }
    .skeleton::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent); animation: shimmer 1.4s infinite; }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); font-size: 15px; }
    footer { background: var(--navy); color: rgba(255,255,255,0.4); text-align: center; padding: 28px; font-size: 13px; }
    footer span { color: var(--gold); }
    footer a { color: rgba(255,255,255,0.4); text-decoration: none; }
    footer a:hover { color: var(--gold-light); }
    @media (max-width: 640px) {
      header { padding: 0 20px; }
      nav { display: none; }
      .catalog-section { padding: 32px 16px 60px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    }
  </style>
</head>
<body>

<header>
</header>

<div class="hero">
  <div class="hero-brand">
    <img class="hero-logo-img" src="logo.png" alt="Ravi Agencies Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"/>
    <div class="logo-fallback" style="display:none;">R</div>
    <div class="hero-brand-name">Ravi Agencies</div>
  </div>
  <div class="hero-tag">Brand Portfolios</div>
  <h1>Our Brand Collection</h1>
  <p>Click on any brand to view and download the full product catalog</p>

  <div class="contact-bar" aria-label="Contact methods">
    <a class="contact-pill" href="tel:+919535589474">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 01.93-.27 11.36 11.36 0 003.55.57 1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1 11.36 11.36 0 00.57 3.55 1 1 0 01-.27.93l-2.18 2.31z"/></svg>
      <span>+91 9535589474</span>
    </a>
    <a class="contact-pill whatsapp" href="https://wa.me/919535589474" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.52 3.48A11.9 11.9 0 0012 .5C6.48.5 1.9 4.86 1.11 10.1c-.2.97.01 1.99.58 2.77L1 22l8.97-1.68c.73.2 1.48.3 2.25.3 5.52 0 10.1-4.36 10.89-9.6a11.9 11.9 0 00-2.59-8.54zM12 20.5a9.1 9.1 0 01-4.53-1.2l-.32-.19-5.32 1 1.06-4.06-.21-.33A8.1 8.1 0 013.9 10.1 8.5 8.5 0 0112 3.5c4.66 0 8.46 3.72 8.46 8.6S16.66 20.5 12 20.5z"/></svg>
      <span>WhatsApp Us</span>
    </a>
    <a class="contact-pill" href="mailto:raviagenciesblr@gmail.com">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      <span>raviagenciesblr@gmail.com</span>
    </a>
    <a class="contact-pill" href="https://maps.app.goo.gl/z2AttxZvAZ24Pd648" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1112 6a2.5 2.5 0 010 5.5z"/></svg>
      <span>Ravi Agencies</span>
    </a>
  </div>
</div>

<section class="catalog-section">
  <div class="section-head">
    <h2 class="section-title">All Brands</h2>
    <div class="section-right">
      <div id="filters" class="filters" aria-label="Brand category filters"></div>
      <span class="brand-count" id="brand-count"></span>
    </div>
  </div>
  <div class="grid" id="catalog-grid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</section>

<footer>
  &copy; 2025 <span>Ravi Agencies</span> · Bengaluru ·
  <a href="mailto:info@raviagenciesblr.in">info@raviagenciesblr.in</a>
</footer>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzc6GU-5lXIrwyAFBq5J-CSIpL3Wp8QO3U0qFf0HeaVdXpaYPRa-hWcTF1-PmMo-wqFFw/exec';

  async function loadCatalogs() {
    const grid = document.getElementById('catalog-grid');
    const countEl = document.getElementById('brand-count');
    const filtersEl = document.getElementById('filters');
    try {
      const res = await fetch(SCRIPT_URL);
      const brands = await res.json();

      // build unique categories (exclude empty/null)
      const categorySet = new Set();
      brands.forEach(b => {
        if (b.category && String(b.category).trim()) categorySet.add(String(b.category).trim());
      });
      const categories = Array.from(categorySet).sort();

      // create filter tabs: All + categories
      const tabs = ['All', ...categories];
      filtersEl.innerHTML = '';
      tabs.forEach((cat, idx) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'filter-pill' + (idx === 0 ? ' active' : '');
        btn.dataset.category = cat;
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          // activate visual state
          Array.from(filtersEl.children).forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          applyFilter(cat, brands);
        });
        filtersEl.appendChild(btn);
      });

      // initial render: show all
      applyFilter('All', brands);

      function applyFilter(category, allBrands) {
        let filtered;
        if (category === 'All') {
          filtered = allBrands.slice();
        } else {
          filtered = allBrands.filter(b => b.category && String(b.category).trim() === category);
        }
        renderGrid(filtered);
        countEl.textContent = filtered.length + ' brand' + (filtered.length !== 1 ? 's' : '');
      }

      function renderGrid(list) {
        if (!list.length) {
          grid.innerHTML = '<div class="empty-state">No catalogs available yet.</div>';
          return;
        }
        grid.innerHTML = list.map((b, i) => `
          <a class="card" href="${b.pdf}" target="_blank" rel="noopener" style="animation-delay:${i * 0.07}s">
            <div class="card-img-wrap">
              <img src="${b.cover}" alt="${b.name}" onerror="this.style.display='none'"/>
              <div class="card-overlay"><span class="view-btn">View Catalog</span></div>
            </div>
            <div class="card-body">
              <span class="card-name">${b.name}</span>
              <div class="card-arrow">
                <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M2 6h8M6 2l4 4-4 4"/>
                </svg>
              </div>
            </div>
          </a>
        `).join('');
      }

    } catch(err) {
      grid.innerHTML = '<div class="empty-state">Failed to load. Please try again later.</div>';
    }
  }

  loadCatalogs();
</script>
</body>
</html>
